name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - canary

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Open source compliance
        run: bun run ci:compliance

      - name: Lint
        run: bun run ci:lint

      - name: Format
        run: bun run ci:format

      - name: Typecheck
        run: bun run ci:typecheck

      - name: Build
        run: bun run ci:build

      - name: Test
        run: bun run ci:test
