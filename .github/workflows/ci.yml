name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - canary

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: |
          if [ -f bun.lock ]; then
            bun install --frozen-lockfile
          else
            bun install
          fi

      - name: Open source compliance
        run: bun run ci:compliance

      - name: Lint
        run: bun run ci:lint

      - name: Format
        run: bun run ci:format

      - name: Typecheck
        run: bun run ci:typecheck

      - name: Build
        run: bun run ci:build

      - name: Test
        run: bun run ci:test
