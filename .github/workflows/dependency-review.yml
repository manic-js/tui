# Runs on pull_request (including every push to the PR branch). Not supported on plain push.
name: Dependency Review

on:
  pull_request:
    branches:
      - main
      - canary

permissions:
  contents: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: low
